<div class="login-page">
  <div class="login-card">
    <h1 class="brand">BlogNest</h1>
    <p class="tagline">Share your stories, connect with readers</p>

    <h2>{{ isSignup ? 'Create Account' : 'Welcome Back' }}</h2>
    <p class="subtitle">{{ isSignup ? 'Sign up to start sharing' : 'Sign in to continue' }}</p>

    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <!-- LOGIN FORM -->
    <form *ngIf="!isSignup" (ngSubmit)="submitLogin()" class="form">
      <input type="email" [(ngModel)]="loginEmail" name="email" placeholder="Email" [disabled]="isLoading" required />
      <input type="password" [(ngModel)]="loginPassword" name="password" placeholder="Password" [disabled]="isLoading" required />
      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form *ngIf="isSignup" (ngSubmit)="submitSignup()" class="form">
      <div class="row">
        <input type="text" [(ngModel)]="firstName" name="firstName" placeholder="First Name" [disabled]="isLoading" required />
        <input type="text" [(ngModel)]="lastName" name="lastName" placeholder="Last Name" [disabled]="isLoading" required />
      </div>
      <input type="email" [(ngModel)]="signupEmail" name="email" placeholder="Email" [disabled]="isLoading" required />
      <input type="password" [(ngModel)]="signupPassword" name="password" placeholder="Password (min 6 chars)" [disabled]="isLoading" required />
      <input type="password" [(ngModel)]="confirmPassword" name="confirm" placeholder="Confirm Password" [disabled]="isLoading" required />
      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Creating Account…' : 'Create Account' }}
      </button>
    </form>

    <div class="divider"><span>or</span></div>

    <button class="btn-google" (click)="googleLogin()" [disabled]="isLoading">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <p class="toggle">
      {{ isSignup ? 'Already have an account?' : "Don't have an account?" }}
      <button class="link" (click)="toggleMode()">{{ isSignup ? 'Sign In' : 'Sign Up' }}</button>
    </p>
  </div>
</div>
